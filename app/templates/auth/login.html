{% extends 'base.html' %}
{% block title %}تسجيل الدخول{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-16">
    <div class="bg-white rounded-2xl shadow-lg p-8 border border-amber-100">
        <h1 class="text-2xl font-bold text-amber-800 mb-6 text-center">تسجيل الدخول</h1>
        <form method="POST" action="{{ url_for('auth.login') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-4">
                <label class="block text-sm font-semibold mb-1">اسم المستخدم</label>
                <input type="text" name="username" required
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-amber-400">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-semibold mb-1">كلمة المرور</label>
                <input type="password" name="password" required
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-amber-400">
            </div>
            <button type="submit"
                class="w-full bg-amber-700 text-white font-bold py-2 rounded-lg hover:bg-amber-800 transition">
                دخول
            </button>
        </form>
    </div>
</div>
{% endblock %}
