{% extends 'base.html' %}
{% block title %}إضافة مستخدم{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-10">
    <div class="bg-white rounded-2xl shadow-lg p-8 border border-amber-100">
        <h1 class="text-2xl font-bold text-amber-800 mb-6">إضافة مستخدم جديد</h1>
        <form method="POST" action="{{ url_for('auth.register') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-4">
                <label class="block text-sm font-semibold mb-1">اسم المستخدم</label>
                <input type="text" name="username" required
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-amber-400">
            </div>
            <div class="mb-4">
                <label class="block text-sm font-semibold mb-1">البريد الإلكتروني</label>
                <input type="email" name="email" required
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-amber-400">
            </div>
            <div class="mb-4">
                <label class="block text-sm font-semibold mb-1">كلمة المرور</label>
                <input type="password" name="password" required
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-amber-400">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-semibold mb-1">الدور</label>
                <select name="role" class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-amber-400">
                    <option value="waiter">نادل</option>
                    <option value="kitchen">مطبخ</option>
                    <option value="admin">مدير</option>
                </select>
            </div>
            <button type="submit"
                class="w-full bg-amber-700 text-white font-bold py-2 rounded-lg hover:bg-amber-800 transition">
                إضافة
            </button>
        </form>
    </div>
</div>
{% endblock %}
